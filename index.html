<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Производственные линии</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ПЛ Компании">
<meta name="theme-color" content="#534AB7">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1918;--ink2:#6b6963;--ink3:#a8a59e;
  --surface:#ffffff;--surface2:#f7f6f3;--surface3:#f0efe9;
  --edge:rgba(0,0,0,0.08);--edge2:rgba(0,0,0,0.14);
  --page-bg:#f5f4f0;
  --tab-h:56px;
  --r:12px;
  --accent:#534AB7;--accent-bg:#EEEDFE;--accent-text:#3C3489;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --coral:#993C1D;--coral-bg:#FAECE7;
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#e8e6de;--ink2:#9c9a92;--ink3:#5f5e5a;
    --surface:#252523;--surface2:#2e2e2b;--surface3:#363633;
    --edge:rgba(255,255,255,0.08);--edge2:rgba(255,255,255,0.14);
    --page-bg:#1c1c1a;
    --accent:#7F77DD;--accent-bg:#26215C;--accent-text:#AFA9EC;
    --teal:#1D9E75;--teal-bg:#04342C;--teal-text:#5DCAA5;
    --amber:#EF9F27;--amber-bg:#412402;
    --coral:#D85A30;--coral-bg:#4A1B0C;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--page-bg);color:var(--ink);font-size:14px;line-height:1.5;padding-bottom:calc(var(--tab-h) + 1rem);}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--surface);border-top:0.5px solid var(--edge2);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:6px 2px;color:var(--ink3);transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:18px;line-height:1;}
.tab-label{font-size:9px;font-weight:500;letter-spacing:0.02em;white-space:nowrap;}

/* PAGES */
.page{display:none;padding:1.5rem 1rem 1rem;max-width:860px;margin:0 auto;}
.page.active{display:block;}

.page-header{margin-bottom:1.25rem;}
.page-header h1{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.page-header p{font-size:12px;color:var(--ink3);}
.top-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink3);border:0.5px solid var(--edge2);border-radius:20px;padding:2px 9px;white-space:nowrap;}
.tag.accent{background:var(--accent-bg);color:var(--accent-text);border-color:rgba(83,74,183,0.2);}

.edit-hint{font-size:11px;color:var(--ink3);display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--edge);border-radius:20px;padding:3px 12px;margin-bottom:1rem;}

/* TEAM STRIP */
.team-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;}
.team-card{background:var(--surface);border:0.5px solid var(--edge);border-radius:10px;padding:8px 12px;display:flex;align-items:flex-start;gap:8px;max-width:100%;}
.team-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-bg);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.team-name{font-size:12px;font-weight:600;color:var(--ink);}
.team-ckp{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.35;}

/* IN/OUT */
.in-out{display:flex;margin-bottom:1.25rem;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--edge2);}
@media(max-width:480px){.in-out{flex-direction:column;}}
.io-side{flex:1;padding:12px 16px;background:var(--surface);}
.io-div{width:1px;background:var(--edge2);flex-shrink:0;}
@media(max-width:480px){.io-div{width:100%;height:1px;}}
.io-lbl{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.io-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.io-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;}
.io-sub{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.4;}

/* DIVIDER */
.div-label{display:flex;align-items:center;gap:10px;margin:1.25rem 0 .75rem;}
.div-label span{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);white-space:nowrap;}
.div-label::before,.div-label::after{content:'';flex:1;height:0.5px;background:var(--edge2);}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:26px 1fr;gap:0 12px;margin-bottom:1.25rem;}
.pipe-spine{display:flex;flex-direction:column;align-items:center;}
.spine-node{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff;}
.spine-line{flex:1;width:1px;background:var(--edge2);min-height:10px;}
.spine-line.last{display:none;}
.stage-wrap{padding-bottom:10px;}
.stage-card{border:0.5px solid var(--edge);border-radius:var(--r);background:var(--surface);overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.stage-card:hover,.stage-card:active{border-color:var(--edge2);}
.stage-card.open{border-color:var(--accent);}
.stage-head{display:flex;align-items:center;gap:10px;padding:11px 14px;}
.sh-text{flex:1;min-width:0;}
.sh-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-product{font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.role-pill{font-size:10px;color:var(--ink2);background:var(--surface2);border:0.5px solid var(--edge);border-radius:20px;padding:2px 8px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.sh-chev{color:var(--ink3);font-size:12px;transition:transform 0.2s;flex-shrink:0;}
.stage-card.open .sh-chev{transform:rotate(180deg);}
.stage-body{display:none;border-top:0.5px solid var(--edge);}
.stage-card.open .stage-body{display:block;}
.tasks-col{padding:12px 14px;border-bottom:0.5px solid var(--edge);}
.meta-row-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;border-bottom:0.5px solid var(--edge);}
.meta-item{}
.col-lbl{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:7px;}
.meta-lbl{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.meta-val{font-size:12px;color:var(--ink);font-weight:600;line-height:1.3;}
.task-item{display:flex;gap:7px;font-size:12px;color:var(--ink2);padding:3px 0;line-height:1.4;}
.task-item::before{content:'–';color:var(--ink3);flex-shrink:0;}
.product-chip{display:inline-flex;align-items:flex-start;gap:4px;background:var(--accent-bg);color:var(--accent-text);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;line-height:1.35;margin-top:4px;}
.metrics-col{padding:10px 14px;}
.metric-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.metric-pill{font-size:10px;color:var(--ink2);background:var(--surface2);border:0.5px solid var(--edge);border-radius:20px;padding:2px 9px;}

/* CHAIN */
.chain-scroll{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.chain-step{background:var(--surface);border:0.5px solid var(--edge);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--ink);}
.chain-step.first{background:var(--accent-bg);color:var(--accent-text);border-color:rgba(83,74,183,0.2);}
.chain-step.last{background:var(--teal-bg);color:var(--teal-text);border-color:rgba(15,110,86,0.2);}
.chain-arr{font-size:11px;color:var(--ink3);}

/* BOTTOM */
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.bottom{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:0.5px solid var(--edge);border-radius:var(--r);padding:14px;}
.panel-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.panel-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.pi-amber{background:var(--amber-bg);}
.pi-teal{background:var(--teal-bg);}
.pi-coral{background:var(--coral-bg);}
.pi-accent{background:var(--accent-bg);}
.panel-title{font-size:12px;font-weight:600;color:var(--ink);}
.bn-item{display:flex;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--edge);}
.bn-item:last-child{border-bottom:none;}
.bn-bar{width:2px;border-radius:2px;background:var(--amber);flex-shrink:0;align-self:stretch;min-height:28px;}
.bn-title{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.bn-text{font-size:11px;color:var(--ink2);line-height:1.4;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.kpi-cell{background:var(--surface2);border-radius:7px;padding:9px 10px;}
.kpi-val{font-size:15px;font-weight:700;color:var(--ink);}
.kpi-lbl{font-size:10px;color:var(--ink3);margin-top:2px;}
.imp-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid var(--edge);}
.imp-item:last-child{border-bottom:none;}
.imp-dept{font-size:10px;font-weight:600;background:var(--surface2);border-radius:20px;padding:2px 8px;color:var(--ink2);white-space:nowrap;flex-shrink:0;}
.imp-text{font-size:11px;color:var(--ink2);line-height:1.4;padding-top:1px;}
.full-col{grid-column:1/-1;}

[contenteditable]{outline:none;border-radius:3px;transition:background 0.15s;}
[contenteditable]:focus{background:rgba(83,74,183,0.09);box-shadow:0 0 0 2px rgba(83,74,183,0.18);}

/* RESET BTN */
#reset-btn{position:fixed;top:.75rem;right:.75rem;z-index:999;font-size:11px;background:var(--surface);border:0.5px solid var(--edge2);border-radius:20px;padding:4px 11px;cursor:pointer;color:var(--ink3);font-family:inherit;}
</style>
</head>

// ── BUILD UI ──────────────────────────────────────────────────────────────────
const tabBar = document.getElementById('tab-bar');
const pagesEl = document.getElementById('pages');

function buildPipeline(stages, containerId) {
  const container = document.getElementById(containerId);
  stages.forEach((s, i) => {
    const spine = document.createElement('div'); spine.className = 'pipe-spine';
    const node = document.createElement('div'); node.className = 'spine-node'; node.textContent = s.n;
    const line = document.createElement('div'); line.className = 'spine-line' + (i === stages.length - 1 ? ' last' : '');
    spine.append(node, line);

    const wrap = document.createElement('div'); wrap.className = 'stage-wrap';
    const card = document.createElement('div'); card.className = 'stage-card';
    card.innerHTML = `
      <div class="stage-head">
        <div class="sh-text">
          <div class="sh-name" contenteditable="true" onclick="event.stopPropagation()">${s.name}</div>
          <div class="sh-product">→ <span contenteditable="true" onclick="event.stopPropagation()">${s.product}</span></div>
        </div>
        <div class="sh-meta">
          <span class="role-pill" contenteditable="true" onclick="event.stopPropagation()">${s.role}</span>
          <span class="sh-chev">▾</span>
        </div>
      </div>
      <div class="stage-body">
        <div class="tasks-col">
          <div class="col-lbl">Задачи</div>
          ${s.tasks.map(t => `<div class="task-item"><span contenteditable="true" onclick="event.stopPropagation()">${t}</span></div>`).join('')}
        </div>
        <div class="meta-row-wrap">
          <div class="meta-item">
            <div class="meta-lbl">Ответственный</div>
            <div class="meta-val" contenteditable="true" onclick="event.stopPropagation()">${s.role}</div>
          </div>
          <div class="meta-item">
            <div class="meta-lbl">Срок</div>
            <div class="meta-val" contenteditable="true" onclick="event.stopPropagation()">${s.deadline}</div>
          </div>
          <div class="meta-item" style="grid-column:1/-1">
            <div class="meta-lbl">Продукт (ЦКП этапа)</div>
            <div class="product-chip" contenteditable="true" onclick="event.stopPropagation()">${s.product}</div>
          </div>
        </div>
        <div class="metrics-col">
          <div class="col-lbl">Метрики качества</div>
          <div class="metric-pills">${s.metrics.map(m => `<span class="metric-pill" contenteditable="true">${m}</span>`).join('')}</div>
        </div>
      </div>`;
    card.querySelector('.stage-head').addEventListener('click', () => {
      const was = card.classList.contains('open');
      container.querySelectorAll('.stage-card').forEach(c => c.classList.remove('open'));
      if (!was) card.classList.add('open');
    });
    wrap.appendChild(card);
    container.append(spine, wrap);
  });
}

DEPTS.forEach((d, di) => {
  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (di === 0 ? ' active' : '');
  btn.innerHTML = `<span class="tab-icon">${d.icon}</span><span class="tab-label">${d.label}</span>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + d.id).classList.add('active');
    window.scrollTo(0, 0);
  });
  tabBar.appendChild(btn);

  // Page
  const page = document.createElement('div');

  page.innerHTML = `

        <div id="bn-${d.id}"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="panel-icon pi-teal">📊</div><div class="panel-title">Ключевые метрики</div></div>
        <div class="kpi-grid" id="kpi-${d.id}"></div>
      </div>
      <div class="panel full-col">
        <div class="panel-head"><div class="panel-icon pi-coral">🔗</div><div class="panel-title">Влияние на другие подразделения</div></div>
        <div id="imp-${d.id}" style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;"></div>
      </div>
    </div>`;
  pagesEl.appendChild(page);

  // Team
  const teamEl = document.getElementById('team-' + d.id);
  d.team.forEach(m => {
    teamEl.innerHTML += `<div class="team-card">
      <div class="team-avatar">${m.i}</div>
      <div>
        <div class="team-name" contenteditable="true">${m.name}</div>
        <div class="team-ckp" contenteditable="true">ЦКП: ${m.ckp}</div>
      </div>
    </div>`;
  });

  // Pipeline
  buildPipeline(d.stages, 'pipe-' + d.id);

  // Chain
  const chainEl = document.getElementById('chain-' + d.id);
  d.chain.forEach((p, i) => {
    const el = document.createElement('span');
    el.className = 'chain-step' + (i === 0 ? ' first' : i === d.chain.length - 1 ? ' last' : '');
    el.setAttribute('contenteditable', 'true');
    el.textContent = p;
    chainEl.appendChild(el);
    if (i < d.chain.length - 1) { const a = document.createElement('span'); a.className = 'chain-arr'; a.textContent = '→'; chainEl.appendChild(a); }
  });

  // Bottlenecks
  const bnEl = document.getElementById('bn-' + d.id);
  d.bns.forEach(b => { bnEl.innerHTML += `<div class="bn-item"><div class="bn-bar"></div><div><div class="bn-title" contenteditable="true">${b.t}</div><div class="bn-text" contenteditable="true">${b.tx}</div></div></div>`; });

  // KPIs
  const kpiEl = document.getElementById('kpi-' + d.id);
  d.kpis.forEach(k => { kpiEl.innerHTML += `<div class="kpi-cell"><div class="kpi-val" contenteditable="true">${k.v}</div><div class="kpi-lbl" contenteditable="true">${k.l}</div></div>`; });

  // Impact
  const impEl = document.getElementById('imp-' + d.id);
  d.impacts.forEach(imp => { impEl.innerHTML += `<div class="imp-item"><span class="imp-dept" contenteditable="true">${imp.d}</span><span class="imp-text" contenteditable="true">${imp.t}</span></div>`; });
});

// ── LOCALSTORAGE SAVE ─────────────────────────────────────────────────────────
function assignIds() {
  document.querySelectorAll('[contenteditable]').forEach((el, i) => {
    if (!el.dataset.sid) el.dataset.sid = 'el-' + i;
  });
}
function saveAll() {
  const data = {};
  document.querySelectorAll('[contenteditable]').forEach(el => {
    if (el.dataset.sid) data[el.dataset.sid] = el.innerHTML;
  });
  try { localStorage.setItem(STORE, JSON.stringify(data)); } catch(e) {}
}
function loadAll() {
  let data;
  try { data = JSON.parse(localStorage.getItem(STORE) || 'null'); } catch(e) { return; }
  if (!data) return;
  document.querySelectorAll('[contenteditable]').forEach(el => {
    if (el.dataset.sid && data[el.dataset.sid] !== undefined) el.innerHTML = data[el.dataset.sid];
  });
}
function showToast(msg) {
  let t = document.getElementById('sv-toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'sv-toast';
    t.style.cssText = 'position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1918;color:#fff;font-size:12px;padding:7px 16px;border-radius:20px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:9999;font-family:-apple-system,sans-serif;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)'; }, 1800);
}
function resetData() {
  if (confirm('Сбросить все правки и вернуть оригинал?')) {
    localStorage.removeItem(STORE); location.reload();
  }
}
let saveTimer;
document.addEventListener('input', e => {
  if (e.target.getAttribute('contenteditable')) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { saveAll(); showToast('✓ Сохранено'); }, 1000);
  }
});
window.addEventListener('load', () => { assignIds(); loadAll(); });
