<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embassy · Производственные линии</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Embassy ПЛ">
<meta name="theme-color" content="#534AB7">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1918;--ink2:#6b6963;--ink3:#a8a59e;
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efe9;
  --edge:rgba(0,0,0,0.08);--edge2:rgba(0,0,0,0.15);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --coral:#993C1D;--coral-bg:#FAECE7;
  --tab-h:58px;--r:12px;
}
body.dark{
  --ink:#e8e6de;--ink2:#9c9a92;--ink3:#5f5e5a;
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --edge:rgba(255,255,255,0.08);--edge2:rgba(255,255,255,0.15);
  --purple:#7F77DD;--purple-bg:#26215C;--purple-text:#AFA9EC;
  --teal:#1D9E75;--teal-bg:#04342C;--teal-text:#5DCAA5;
  --amber:#EF9F27;--amber-bg:#412402;
  --coral:#D85A30;--coral-bg:#4A1B0C;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));}

/* ── TAB BAR ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--edge2);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;padding:6px 2px;color:var(--ink3);-webkit-tap-highlight-color:transparent;min-width:0;}
.tab-btn.active{color:var(--purple);}
.tab-icon{font-size:19px;line-height:1;}
.tab-label{font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;}

/* ── TOP BAR ── */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:199;background:var(--bg2);border-bottom:0.5px solid var(--edge);display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));}
.top-bar-title{font-size:15px;font-weight:500;color:var(--ink);}
.top-bar-actions{display:flex;gap:4px;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:18px;-webkit-tap-highlight-color:transparent;}
.icon-btn:active{background:var(--bg3);}

/* ── PAGES ── */
.page-wrap{padding-top:calc(52px + env(safe-area-inset-top) + 1rem);}
.page{display:none;padding:0 1rem 1rem;max-width:860px;margin:0 auto;}
.page.active{display:block;}

/* ── SEARCH OVERLAY ── */
.search-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;padding:calc(env(safe-area-inset-top) + 12px) 16px 1rem;overflow-y:auto;}
.search-overlay.open{display:block;}
.search-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.search-input{flex:1;height:40px;border-radius:var(--r);border:0.5px solid var(--edge2);background:var(--bg2);color:var(--ink);font-size:14px;padding:0 14px;font-family:inherit;}
.search-input::placeholder{color:var(--ink3);}
.search-cancel{font-size:14px;color:var(--purple);background:none;border:none;cursor:pointer;white-space:nowrap;font-family:inherit;}
.search-result{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.sr-dept{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.sr-name{font-size:13px;font-weight:500;color:var(--ink);}
.sr-snippet{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4;}
mark{background:var(--purple-bg);color:var(--purple-text);border-radius:3px;padding:0 2px;}

/* ── PRESENT MODE ── */
.present-overlay{display:none;position:fixed;inset:0;background:var(--bg2);z-index:400;flex-direction:column;}
.present-overlay.open{display:flex;}
.present-top{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:0.5px solid var(--edge);}
.present-title{font-size:16px;font-weight:500;color:var(--ink);}
.present-body{flex:1;overflow-y:auto;padding:2rem 1.5rem;}
.present-stage{margin-bottom:2rem;}
.ps-num{width:36px;height:36px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;margin-bottom:.75rem;}
.ps-dept{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:4px;}
.ps-name{font-size:20px;font-weight:500;color:var(--ink);margin-bottom:.5rem;}
.ps-product{font-size:14px;color:var(--ink2);margin-bottom:1rem;padding-left:12px;border-left:2px solid var(--purple);}
.ps-tasks{list-style:none;}
.ps-tasks li{font-size:14px;color:var(--ink2);padding:4px 0;display:flex;gap:8px;}
.ps-tasks li::before{content:'→';color:var(--ink3);flex-shrink:0;}
.present-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:0.5px solid var(--edge);}
.nav-btn{height:40px;padding:0 20px;border-radius:var(--r);border:0.5px solid var(--edge2);background:var(--bg2);color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.nav-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.nav-btn:disabled{opacity:.35;cursor:default;}
.present-progress{font-size:13px;color:var(--ink3);}

/* ── SECTION HEADERS ── */
.section-header{margin:1.5rem 0 .75rem;}
.section-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:.5px;background:var(--edge2);}
.section-sub{font-size:11px;color:var(--ink3);margin-top:3px;}

/* ── DASHBOARD ── */
.dash-hero{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;}
.hero-eyebrow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:.4rem;}
.hero-title{font-size:18px;font-weight:500;color:var(--ink);margin-bottom:.25rem;}
.hero-sub{font-size:12px;color:var(--ink2);line-height:1.5;}
.hero-ckp{margin-top:1rem;padding:.75rem 1rem;background:var(--bg3);border-radius:10px;}
.ckp-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:.3rem;}
.ckp-val{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;}
.ckp-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--purple);margin-right:7px;vertical-align:middle;}

.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem;}
.tracker-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:12px 14px;}
.tc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.tc-label{font-size:12px;font-weight:500;color:var(--ink);}
.tc-pct{font-size:12px;font-weight:500;color:var(--purple);}
.tc-bar-bg{height:5px;background:var(--bg3);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.tc-bar-fill{height:100%;background:var(--purple);border-radius:10px;transition:width .3s;}
.tc-nums{display:flex;justify-content:space-between;align-items:baseline;}
.tc-fact{font-size:20px;font-weight:500;color:var(--ink);}
.tc-plan{font-size:11px;color:var(--ink3);}
.tc-inputs{display:flex;gap:6px;margin-top:8px;}
.tc-input{width:100%;height:32px;border-radius:8px;border:0.5px solid var(--edge2);background:var(--bg3);color:var(--ink);font-size:12px;padding:0 8px;font-family:inherit;text-align:center;}

/* ── DEPT CARDS (ЦКП) ── */
.dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dept-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:.875rem 1rem;}
.dept-card.full{grid-column:1/-1;border-color:var(--purple);}
.dc-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:.2rem;}
.dc-ckp{font-size:11px;color:var(--ink2);line-height:1.4;}

/* ── PIPELINE ── */
.pipeline{display:flex;flex-direction:column;}
.stage-row{display:grid;grid-template-columns:28px 1fr;gap:0 12px;}
.stage-spine{display:flex;flex-direction:column;align-items:center;}
.s-node{width:26px;height:26px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.s-line{flex:1;width:1px;background:var(--edge2);min-height:10px;}
.s-line.last{background:transparent;}
.stage-content{padding-bottom:10px;}
.stage-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);overflow:hidden;cursor:pointer;}
.stage-card.open{border-color:var(--purple);}
.sh{display:flex;align-items:center;gap:10px;padding:11px 14px;}
.sh-body{flex:1;min-width:0;}
.sh-dept{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:1px;}
.sh-name{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-product{font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.check-badge{width:18px;height:18px;border-radius:50%;background:var(--teal-bg);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;display:none;}
.check-badge.show{display:flex;}
.sh-chev{font-size:12px;color:var(--ink3);transition:transform .2s;}
.stage-card.open .sh-chev{transform:rotate(180deg);}
.sb{display:none;border-top:0.5px solid var(--edge);}
.stage-card.open .sb{display:block;}
.sb-tabs{display:flex;border-bottom:0.5px solid var(--edge);}
.sb-tab{flex:1;padding:8px;font-size:11px;font-weight:500;color:var(--ink3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;}
.sb-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.sb-panel{display:none;padding:12px 14px;}
.sb-panel.active{display:block;}
.sb-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--edge);}
.task-item:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--edge2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;color:transparent;transition:all .15s;}
.task-check.done{background:var(--purple);border-color:var(--purple);color:#fff;}
.task-text{font-size:12px;color:var(--ink2);line-height:1.4;}
.task-text.done{text-decoration:line-through;color:var(--ink3);}
.product-chip{display:inline-flex;align-items:center;gap:5px;background:var(--purple-bg);color:var(--purple-text);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;}
.metric-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.metric-pill{font-size:11px;color:var(--ink2);background:var(--bg3);border:0.5px solid var(--edge);border-radius:20px;padding:2px 9px;}
.note-area{width:100%;min-height:80px;border-radius:8px;border:0.5px solid var(--edge2);background:var(--bg3);color:var(--ink);font-size:12px;padding:8px 10px;font-family:inherit;resize:none;line-height:1.5;}
.note-area::placeholder{color:var(--ink3);}
.share-btn{display:flex;align-items:center;gap:6px;margin-top:10px;width:100%;height:36px;border-radius:8px;border:0.5px solid #25D366;background:#25D36615;color:#25D366;font-size:12px;font-weight:500;cursor:pointer;justify-content:center;font-family:inherit;}

/* ── CHAIN ── */
.chain-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.ch-step{background:var(--bg2);border:0.5px solid var(--edge);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--ink2);}
.ch-step.first{background:var(--purple-bg);color:var(--purple-text);border-color:rgba(83,74,183,.2);}
.ch-step.last{background:var(--teal-bg);color:var(--teal-text);border-color:rgba(15,110,86,.2);}
.ch-arr{font-size:11px;color:var(--ink3);}

/* ── PANELS ── */
.panel{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:1rem;margin-bottom:10px;}
.panel-head{display:flex;align-items:center;gap:8px;margin-bottom:.875rem;}
.panel-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.pi-amber{background:var(--amber-bg);}
.pi-teal{background:var(--teal-bg);}
.pi-coral{background:var(--coral-bg);}
.panel-title{font-size:13px;font-weight:500;color:var(--ink);}
.bn-item{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--edge);}
.bn-item:last-child{border-bottom:none;}
.bn-bar{width:2px;border-radius:2px;background:var(--amber);flex-shrink:0;align-self:stretch;min-height:24px;}
.bn-title{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:2px;}
.bn-text{font-size:11px;color:var(--ink2);line-height:1.4;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kpi-cell{background:var(--bg3);border-radius:8px;padding:10px 12px;}
.kpi-val{font-size:15px;font-weight:500;color:var(--ink);}
.kpi-lbl{font-size:11px;color:var(--ink3);margin-top:2px;}
.imp-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--edge);}
.imp-item:last-child{border-bottom:none;}
.imp-dept{font-size:11px;font-weight:500;background:var(--bg3);border-radius:20px;padding:2px 9px;color:var(--ink2);white-space:nowrap;flex-shrink:0;}
.imp-text{font-size:11px;color:var(--ink2);line-height:1.4;padding-top:2px;}
.full-col{grid-column:1/-1;}

/* ── TEAM CARDS ── */
.team-strip{display:flex;flex-wrap:wrap;gap:8px;}
.team-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:10px;padding:8px 12px;display:flex;align-items:flex-start;gap:8px;}
.team-avatar{width:26px;height:26px;border-radius:50%;background:var(--purple-bg);color:var(--purple-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.team-name{font-size:12px;font-weight:500;color:var(--ink);}
.team-ckp{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.35;}

.in-out{display:flex;margin-bottom:1rem;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--edge2);}
.io-side{flex:1;padding:12px 14px;background:var(--bg2);}
.io-div{width:1px;background:var(--edge2);flex-shrink:0;}
.io-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.io-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.io-title{font-size:13px;font-weight:500;color:var(--ink);line-height:1.35;}
.io-sub{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.4;}

.top-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);border:0.5px solid var(--edge2);border-radius:20px;padding:2px 9px;}
.tag.accent{background:var(--purple-bg);color:var(--purple-text);border-color:rgba(83,74,183,.2);}
.page-header{margin-bottom:1rem;}
.page-header h2{font-size:16px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.page-header p{font-size:12px;color:var(--ink3);}

/* ── TOAST ── */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg2);font-size:12px;padding:7px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;font-family:inherit;}

@media(max-width:480px){.in-out{flex-direction:column;}.io-div{width:100%;height:1px;}}
@media print{.tab-bar,.top-bar{display:none;}.page{display:block!important;}.stage-card.open .sb,.sb{display:block!important;}.sh-chev{display:none;}}
</style>
</head>
<body>

<div id="toast"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-bar-title" id="top-title">Embassy</span>
  <div class="top-bar-actions">
    <button class="icon-btn" onclick="openSearch()" title="Поиск">🔍</button>
    <button class="icon-btn" onclick="openPresent()" title="Презентация">📊</button>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Тема">🌙</button>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar" id="tab-bar"></div>

<!-- PAGES -->
<div class="page-wrap" id="pages"></div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay">
  <div class="search-header">
    <input class="search-input" id="search-input" type="search" placeholder="Поиск по всем отделам..." oninput="doSearch(this.value)" autofocus>
    <button class="search-cancel" onclick="closeSearch()">Отмена</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- PRESENTATION OVERLAY -->
<div class="present-overlay" id="present-overlay">
  <div class="present-top">
    <span class="present-title" id="present-dept-title"></span>
    <button class="icon-btn" onclick="closePresent()">✕</button>
  </div>
  <div class="present-body" id="present-body"></div>
  <div class="present-nav">
    <button class="nav-btn" id="prev-btn" onclick="presentNav(-1)">← Назад</button>
    <span class="present-progress" id="present-prog"></span>
    <button class="nav-btn primary" id="next-btn" onclick="presentNav(1)">Далее →</button>
  </div>
</div>

<script>
const DEPTS = [
  {
    id:'company', icon:'🏛', label:'Embassy',
    title:'Embassy · Производственная линия компании',
    sub:'Как лид превращается в выпускника с целевым баллом IELTS',
    tags:['6 отделов','Embassy IELTS','Оффлайн + Онлайн'],
    inputTitle:'Потенциальный клиент — студент или родитель',
    inputSub:'Человек, заинтересованный в подготовке к IELTS: хочет целевой балл для поступления, работы или эмиграции',
    outputTitle:'Выпускник с достигнутым целевым баллом IELTS',
    outputSub:'Студент или его родители получили результат, ради которого пришли — подтверждённый балл и реализованная цель',
    team:[
      {i:'🏛',name:'Embassy — миссия компании',ckp:'Выпускник с достигнутым целевым баллом IELTS, рекомендующий Embassy'},
      {i:'📣',name:'Маркетинг',ckp:'Стабильный поток целевых заявок из Instagram с измеримым ROI'},
      {i:'💼',name:'Продажи',ckp:'Оплаченный договор и студент, стартовавший обучение с правильными ожиданиями'},
      {i:'🎓',name:'Академия',ckp:'Выпускник с подтверждённым результатом IELTS и полученным отзывом'},
      {i:'🏢',name:'Администрация',ckp:'Организованная оффлайн точка с актуальными записями без жалоб'},
      {i:'👥',name:'HR',ckp:'Продуктивная стабильная команда с минимальной текучестью'},
      {i:'💰',name:'Финансы',ckp:'Актуальная управленческая отчётность с выводами для руководства'},

<script>
const STORE = 'embassy-pl-v1';
let currentDept = 'company';
let presentStages = [];
let presentIdx = 0;
let isDark = false;

// ── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme(){
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  try{ localStorage.setItem('embassy-theme', isDark ? 'dark' : 'light'); }catch(e){}
}
function initTheme(){
  try{
    const t = localStorage.getItem('embassy-theme');
    if(t === 'dark'){ isDark = true; document.body.classList.add('dark'); document.getElementById('theme-btn').textContent = '☀️'; }
  }catch(e){}
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(8px)'; }, 1800);
}

// ── STORAGE ──────────────────────────────────────────────────────────────────
function saveAll(){
  const data={};
  document.querySelectorAll('[contenteditable][data-sid]').forEach(el=>{ data[el.dataset.sid]=el.innerHTML; });
  // tracker values
  document.querySelectorAll('.tc-input[data-key]').forEach(el=>{ data['tracker-'+el.dataset.key]=el.value; });
  // checklist
  document.querySelectorAll('.task-check[data-ckey]').forEach(el=>{ data['check-'+el.dataset.ckey]=el.classList.contains('done')?'1':'0'; });
  // notes
  document.querySelectorAll('.note-area[data-nkey]').forEach(el=>{ data['note-'+el.dataset.nkey]=el.value; });
  try{ localStorage.setItem(STORE, JSON.stringify(data)); }catch(e){}
}
function loadAll(){
  let data; try{ data=JSON.parse(localStorage.getItem(STORE)||'null'); }catch(e){ return; }
  if(!data) return;
  document.querySelectorAll('[contenteditable][data-sid]').forEach(el=>{ if(data[el.dataset.sid]!==undefined) el.innerHTML=data[el.dataset.sid]; });
  document.querySelectorAll('.tc-input[data-key]').forEach(el=>{ if(data['tracker-'+el.dataset.key]!==undefined){ el.value=data['tracker-'+el.dataset.key]; updateTracker(el); } });
  document.querySelectorAll('.task-check[data-ckey]').forEach(el=>{ if(data['check-'+el.dataset.ckey]==='1') setCheckDone(el,true); });
  document.querySelectorAll('.note-area[data-nkey]').forEach(el=>{ if(data['note-'+el.dataset.nkey]!==undefined) el.value=data['note-'+el.dataset.nkey]; });
}
function resetData(){ if(confirm('Сбросить все данные?')){ localStorage.removeItem(STORE); location.reload(); } }
let saveTimer;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ saveAll(); showToast('✓ Сохранено'); },800); }

// ── CHECKLIST ────────────────────────────────────────────────────────────────
function setCheckDone(el, done){
  if(done){ el.classList.add('done'); el.textContent='✓'; }
  else{ el.classList.remove('done'); el.textContent=''; }
  const text = el.nextElementSibling;
  if(text) text.classList.toggle('done', done);
  // update badge
  const card = el.closest('.stage-card');
  if(card) updateBadge(card);
}
function toggleCheck(el){
  setCheckDone(el, !el.classList.contains('done'));
  scheduleSave();
}
function updateBadge(card){
  const checks = card.querySelectorAll('.task-check');
  const done = card.querySelectorAll('.task-check.done');
  const badge = card.querySelector('.check-badge');
  if(!badge) return;
  if(done.length > 0 && done.length === checks.length){
    badge.textContent='✓'; badge.classList.add('show');
  } else if(done.length > 0){
    badge.textContent=done.length+'/'+checks.length; badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ── TRACKER ──────────────────────────────────────────────────────────────────
function updateTracker(input){
  const card = input.closest('.tracker-card');
  if(!card) return;
  const inputs = card.querySelectorAll('.tc-input');
  const fact = parseInt(inputs[0]?.value)||0;
  const plan = parseInt(inputs[1]?.value)||1;
  const pct = Math.min(100, Math.round(fact/plan*100));
  const fill = card.querySelector('.tc-bar-fill');
  const pctEl = card.querySelector('.tc-pct');
  const factEl = card.querySelector('.tc-fact');
  const planEl = card.querySelector('.tc-plan');
  if(fill) fill.style.width = pct+'%';
  if(pctEl) pctEl.textContent = pct+'%';
  if(factEl) factEl.textContent = fact;
  if(planEl) planEl.textContent = 'из '+plan;
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function highlight(text, q){
  if(!q) return esc(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function doSearch(q){
  const res = document.getElementById('search-results');
  if(!q || q.length < 2){ res.innerHTML=''; return; }
  const results=[];
  DEPTS.forEach(d=>{
    if(d.id==='company') return;
    d.stages.forEach(s=>{
      const searchable = [s.name, s.product, ...(s.tasks||[]), ...(s.metrics||[])].join(' ');
      if(searchable.toLowerCase().includes(q.toLowerCase())){
        const snippet = s.tasks.find(t=>t.toLowerCase().includes(q.toLowerCase())) || s.product;
        results.push({dept:d.label, deptId:d.id, stageN:s.n, name:s.name, snippet});
      }
    });
  });
  if(!results.length){ res.innerHTML='<div style="color:var(--ink3);font-size:13px;padding:1rem 0">Ничего не найдено</div>'; return; }
  res.innerHTML = results.map(r=>`
    <div class="search-result" onclick="goToStage('${r.deptId}',${r.stageN})">
      <div class="sr-dept">${esc(r.dept)}</div>
      <div class="sr-name">${highlight(r.name,q)}</div>
      <div class="sr-snippet">${highlight(r.snippet,q)}</div>
    </div>`).join('');
}
function goToStage(deptId, stageN){
  closeSearch();
  switchPage(deptId);
  setTimeout(()=>{
    const card = document.querySelector(`#pipe-${deptId} .stage-card[data-n="${stageN}"]`);
    if(card){ card.classList.add('open'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
  }, 200);
}

// ── PRESENTATION ─────────────────────────────────────────────────────────────
function openPresent(){
  const dept = DEPTS.find(d=>d.id===currentDept);
  if(!dept||!dept.stages) return;
  presentStages = dept.stages;
  presentIdx = 0;
  document.getElementById('present-dept-title').textContent = dept.label + ' · Презентация';
  document.getElementById('present-overlay').classList.add('open');
  renderPresentSlide();
}
function closePresent(){ document.getElementById('present-overlay').classList.remove('open'); }
function presentNav(dir){
  presentIdx = Math.max(0, Math.min(presentStages.length-1, presentIdx+dir));
  renderPresentSlide();
}
function renderPresentSlide(){
  const s = presentStages[presentIdx];
  const total = presentStages.length;
  document.getElementById('present-prog').textContent = (presentIdx+1)+' / '+total;
  document.getElementById('prev-btn').disabled = presentIdx===0;
  document.getElementById('next-btn').disabled = presentIdx===total-1;
  document.getElementById('present-body').innerHTML=`
    <div class="present-stage">
      <div class="ps-num">${s.n}</div>
      <div class="ps-dept">${s.role||''}</div>
      <div class="ps-name">${s.name}</div>
      <div class="ps-product">${s.product}</div>
      <ul class="ps-tasks">${(s.tasks||[]).map(t=>`<li>${t}</li>`).join('')}</ul>
      <div style="margin-top:1rem;">
        <div class="ps-dept" style="margin-bottom:.5rem">МЕТРИКИ КАЧЕСТВА</div>
        <div class="metric-pills">${(s.metrics||[]).map(m=>`<span class="metric-pill">${m}</span>`).join('')}</div>
      </div>
    </div>`;
}

// ── WHATSAPP SHARE ───────────────────────────────────────────────────────────
function shareStage(stage, deptName){
  const text = `*${deptName} · Этап ${stage.n}: ${stage.name}*\n\n📦 *Продукт:* ${stage.product}\n\n✅ *Задачи:*\n${stage.tasks.map(t=>'• '+t).join('\n')}\n\n📊 *Метрики:*\n${stage.metrics.map(m=>'• '+m).join('\n')}\n\n_Embassy — Производственные линии_`;
  const url = 'https://wa.me/?text='+encodeURIComponent(text);
  window.open(url,'_blank');
}

            <div style="font-size:12px;font-weight:500;color:var(--ink)" contenteditable="true" data-sid="sd-${ckey}">${s.deadline}</div>
          </div>
          <div style="margin-bottom:10px">
            <div class="sb-lbl">ПРОДУКТ (ЦКП ЭТАПА)</div>
            <div class="product-chip" contenteditable="true" data-sid="spr-${ckey}">${s.product}</div>
          </div>
          <div>
            <div class="sb-lbl">МЕТРИКИ КАЧЕСТВА</div>
            <div class="metric-pills">${s.metrics.map((m,mi)=>`<span class="metric-pill" contenteditable="true" data-sid="sm-${ckey}-${mi}">${m}</span>`).join('')}</div>
          </div>
        </div>
        <div class="sb-panel" data-panel="notes">
          <div class="sb-lbl" style="margin-top:4px">ЗАМЕТКИ К ЭТАПУ</div>
          <textarea class="note-area" data-nkey="${ckey}" placeholder="Добавьте заметку или комментарий к этому этапу..." oninput="scheduleSave()"></textarea>
          <button class="share-btn" onclick="shareStage(${JSON.stringify(s).replace(/</g,'\\u003c')}, '${deptLabel}')">
            <span style="font-size:16px">📤</span> Поделиться через WhatsApp
          </button>
        </div>
      </div>`;
    card.querySelector('.sh').addEventListener('click',()=>{
      const was=card.classList.contains('open');
      container.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('open'));
      if(!was) card.classList.add('open');
    });
    wrap.appendChild(card); row.append(spine,wrap); container.appendChild(row);
  });
}

function switchTab(tab, panel){
  const sb = tab.closest('.sb');
  sb.querySelectorAll('.sb-tab').forEach(t=>t.classList.remove('active'));
  sb.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  sb.querySelector(`[data-panel="${panel}"]`).classList.add('active');
}

function switchPage(id){
  currentDept = id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+id));
  const dept = DEPTS.find(d=>d.id===id);
  document.getElementById('top-title').textContent = dept ? dept.title.split('·')[0].trim() : 'Embassy';
  window.scrollTo(0,0);
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
const tabBar = document.getElementById('tab-bar');
const pagesEl = document.getElementById('pages');

// Dashboard tab
const dashTab = document.createElement('button');
dashTab.className='tab-btn active'; dashTab.dataset.id='company';
dashTab.innerHTML='<span class="tab-icon">🏛</span><span class="tab-label">Embassy</span>';
dashTab.addEventListener('click',()=>switchPage('company'));
tabBar.appendChild(dashTab);
pagesEl.appendChild(buildDashPage());

// Dept tabs + pages
DEPTS.filter(d=>d.id!=='company').forEach((d,di)=>{
  // Tab
  const btn=document.createElement('button');
  btn.className='tab-btn'; btn.dataset.id=d.id;
  btn.innerHTML=`<span class="tab-icon">${d.icon}</span><span class="tab-label">${d.label}</span>`;
  btn.addEventListener('click',()=>switchPage(d.id));
  tabBar.appendChild(btn);

  // Page
  const page=document.createElement('div');
  page.className='page'; page.id='page-'+d.id;
  page.innerHTML=`
    <div class="page-header">
      <h2 contenteditable="true" data-sid="ph-${d.id}">${d.title}</h2>
      <p contenteditable="true" data-sid="ps-${d.id}">${d.sub}</p>
      <div class="top-tags">${d.tags.map((t,i)=>`<span class="tag${i===0?' accent':''}">${t}</span>`).join('')}</div>
    </div>

    <div class="section-header">
      <div class="section-title">КОМАНДА И ЦКП</div>
    </div>
    <div class="team-strip" id="team-${d.id}" style="margin-bottom:1rem"></div>

    <div class="section-header">
      <div class="section-title">ВХОДЯЩИЙ И КОНЕЧНЫЙ ПРОДУКТ</div>
    </div>
    <div class="in-out">
      <div class="io-side">
        <div class="io-lbl">ВХОДЯЩИЙ ПРОДУКТ</div>
        <div class="io-title" contenteditable="true" data-sid="it-${d.id}"><span class="io-dot" style="background:var(--purple)"></span>${d.inputTitle}</div>
        <div class="io-sub" contenteditable="true" data-sid="is-${d.id}">${d.inputSub}</div>
      </div>
      <div class="io-div"></div>
      <div class="io-side">
        <div class="io-lbl">ЦКП ОТДЕЛА</div>
        <div class="io-title" contenteditable="true" data-sid="ot-${d.id}"><span class="io-dot" style="background:var(--teal)"></span>${d.outputTitle}</div>
        <div class="io-sub" contenteditable="true" data-sid="os-${d.id}">${d.outputSub}</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">ЭТАПЫ ПРОИЗВОДСТВЕННОЙ ЛИНИИ</div>
      <div class="section-sub">Нажмите на этап — раскроются задачи, детали и заметки</div>
    </div>
    <div class="pipeline" id="pipe-${d.id}" style="margin-bottom:.5rem"></div>

    <div class="section-header">
      <div class="section-title">ЦЕПОЧКА ПРОДУКТОВ</div>
    </div>
    <div class="chain-row" id="chain-${d.id}" style="margin-bottom:1.5rem"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="panel" style="grid-column:1/-1">
        <div class="panel-head"><div class="panel-icon pi-amber">⚡</div><div class="panel-title">УЗКИЕ МЕСТА</div></div>
        <div id="bn-${d.id}"></div>
      </div>
      <div class="panel" style="grid-column:1/-1">
        <div class="panel-head"><div class="panel-icon pi-teal">📊</div><div class="panel-title">КЛЮЧЕВЫЕ МЕТРИКИ</div></div>
        <div class="kpi-grid" id="kpi-${d.id}"></div>
      </div>
      <div class="panel" style="grid-column:1/-1">
        <div class="panel-head"><div class="panel-icon pi-coral">🔗</div><div class="panel-title">ВЛИЯНИЕ НА ДРУГИЕ ПОДРАЗДЕЛЕНИЯ</div></div>
        <div id="imp-${d.id}"></div>
      </div>
    </div>`;
  pagesEl.appendChild(page);

  // Team
  const teamEl=document.getElementById('team-'+d.id);
  d.team.forEach(m=>{
    teamEl.innerHTML+=`<div class="team-card"><div class="team-avatar">${m.i}</div><div><div class="team-name" contenteditable="true" data-sid="tm-${d.id}-${m.i}">${m.name}</div><div class="team-ckp" contenteditable="true" data-sid="tc-${d.id}-${m.i}">ЦКП: ${m.ckp}</div></div></div>`;
  });

  // Pipeline
  buildPipeline(d.stages,'pipe-'+d.id,d.label);

  // Chain
  const chainEl=document.getElementById('chain-'+d.id);
  d.chain.forEach((p,i)=>{
    const el=document.createElement('span');
    el.className='ch-step'+(i===0?' first':i===d.chain.length-1?' last':'');
    el.setAttribute('contenteditable','true'); el.dataset.sid=`ch-${d.id}-${i}`; el.textContent=p;
    chainEl.appendChild(el);
    if(i<d.chain.length-1){const a=document.createElement('span');a.className='ch-arr';a.textContent='→';chainEl.appendChild(a);}
  });

  // Bottlenecks
  const bnEl=document.getElementById('bn-'+d.id);
  d.bns.forEach((b,bi)=>{
    bnEl.innerHTML+=`<div class="bn-item"><div class="bn-bar"></div><div><div class="bn-title" contenteditable="true" data-sid="bnt-${d.id}-${bi}">${b.t}</div><div class="bn-text" contenteditable="true" data-sid="bnx-${d.id}-${bi}">${b.tx}</div></div></div>`;
  });

  // KPIs
  const kpiEl=document.getElementById('kpi-'+d.id);
  d.kpis.forEach((k,ki)=>{
    kpiEl.innerHTML+=`<div class="kpi-cell"><div class="kpi-val" contenteditable="true" data-sid="kv-${d.id}-${ki}">${k.v}</div><div class="kpi-lbl" contenteditable="true" data-sid="kl-${d.id}-${ki}">${k.l}</div></div>`;
  });

  // Impact
  const impEl=document.getElementById('imp-'+d.id);
  d.impacts.forEach((imp,ii)=>{
    impEl.innerHTML+=`<div class="imp-item"><span class="imp-dept" contenteditable="true" data-sid="id-${d.id}-${ii}">${imp.d}</span><span class="imp-text" contenteditable="true" data-sid="ix-${d.id}-${ii}">${imp.t}</span></div>`;
  });
});

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.addEventListener('input',e=>{
  if(e.target.getAttribute('contenteditable')) scheduleSave();
});

window.addEventListener('load',()=>{ initTheme(); loadAll(); });
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
