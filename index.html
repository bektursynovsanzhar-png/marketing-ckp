<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1918;--ink2:#6b6963;--ink3:#a8a59e;
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efe9;
  --edge:rgba(0,0,0,0.07);--edge2:rgba(0,0,0,0.13);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --coral:#993C1D;--coral-bg:#FAECE7;
  --tab-h:72px;--top-h:52px;--r:14px;
}
body.dark{
  --ink:#e8e6de;--ink2:#9c9a92;--ink3:#5f5e5a;
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --edge:rgba(255,255,255,0.07);--edge2:rgba(255,255,255,0.13);
  --purple:#7F77DD;--purple-bg:#26215C;--purple-text:#AFA9EC;
  --teal:#1D9E75;--teal-bg:#04342C;--teal-text:#5DCAA5;
  --amber:#EF9F27;--amber-bg:#412402;
  --coral:#D85A30;--coral-bg:#4A1B0C;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px);}

/* ── TOP BAR ── */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:199;background:var(--bg2);border-bottom:0.5px solid var(--edge2);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:calc(var(--top-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}
.top-bar-title{font-size:15px;font-weight:500;color:var(--ink);}
.top-bar-actions{display:flex;gap:2px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);-webkit-tap-highlight-color:transparent;transition:background .15s;}
.icon-btn:active{background:var(--bg3);}
.icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}

/* ── TAB BAR ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:0.5px solid var(--edge2);
  display:flex;justify-content:center;align-items:stretch;
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
  height:calc(var(--tab-h) + env(safe-area-inset-bottom));
}
.tab-bar-inner{
  display:flex;justify-content:center;align-items:stretch;
  width:100%;max-width:600px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tab-bar-inner::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1;min-width:64px;max-width:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;
  padding:6px 4px;color:var(--ink3);
  -webkit-tap-highlight-color:transparent;
  transition:color .2s;
}
.tab-btn.active{color:var(--purple);}
.tab-icon-wrap{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s, transform .2s;
}
.tab-btn:hover .tab-icon-wrap{transform:scale(1.15);}
.tab-btn.active .tab-icon-wrap{background:var(--purple-bg);}
.tab-btn:hover:not(.active) .tab-icon-wrap{background:var(--bg3);}
.tab-icon-wrap svg{
  width:26px;height:26px;
  stroke:currentColor;fill:none;
  stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;
}
.tab-label{font-size:10px;font-weight:500;white-space:nowrap;}

/* ── PAGES ── */
.page-wrap{padding-top:calc(var(--top-h) + env(safe-area-inset-top) + 1rem);}
.page{display:none;padding:0 1rem 1rem;max-width:860px;margin:0 auto;}
.page.active{display:block;}

/* ── SEARCH OVERLAY ── */
.search-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;padding-top:calc(env(safe-area-inset-top) + var(--top-h) + 12px);padding-left:16px;padding-right:16px;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 1rem);overflow-y:auto;}
.search-overlay.open{display:block;}
.search-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.search-input{flex:1;height:42px;border-radius:var(--r);border:0.5px solid var(--edge2);background:var(--bg2);color:var(--ink);font-size:14px;padding:0 14px;font-family:inherit;}
.search-input::placeholder{color:var(--ink3);}
.search-cancel{font-size:14px;color:var(--purple);background:none;border:none;cursor:pointer;white-space:nowrap;font-family:inherit;}
.search-result{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.sr-dept{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.sr-name{font-size:13px;font-weight:500;color:var(--ink);}
.sr-snippet{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4;}
mark{background:var(--purple-bg);color:var(--purple-text);border-radius:3px;padding:0 2px;}

/* ── PRESENT MODE ── */
.present-overlay{display:none;position:fixed;inset:0;background:var(--bg2);z-index:400;flex-direction:column;}
.present-overlay.open{display:flex;}
.present-top{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:0.5px solid var(--edge);}
.present-title{font-size:16px;font-weight:500;color:var(--ink);}
.present-body{flex:1;overflow-y:auto;padding:2rem 1.5rem;}
.present-stage{margin-bottom:2rem;}
.ps-num{width:40px;height:40px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;margin-bottom:.875rem;}
.ps-dept{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:4px;}
.ps-name{font-size:22px;font-weight:500;color:var(--ink);margin-bottom:.5rem;}
.ps-product{font-size:14px;color:var(--ink2);margin-bottom:1rem;padding-left:14px;border-left:2px solid var(--purple);}
.ps-tasks{list-style:none;}
.ps-tasks li{font-size:14px;color:var(--ink2);padding:5px 0;display:flex;gap:8px;}
.ps-tasks li::before{content:'→';color:var(--ink3);flex-shrink:0;}
.present-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:0.5px solid var(--edge);}
.nav-btn{height:42px;padding:0 20px;border-radius:var(--r);border:0.5px solid var(--edge2);background:var(--bg2);color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.nav-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.present-progress{font-size:13px;color:var(--ink3);}

/* ── SECTION HEADERS ── */
.section-header{margin:1.75rem 0 .875rem;}
.section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:.5px;background:var(--edge2);}
.section-sub{font-size:11px;color:var(--ink3);margin-top:3px;}

/* ── DASHBOARD ── */
.dash-hero{background:var(--purple);border-radius:var(--r);padding:1.375rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.dash-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.06);}
.dash-hero::after{content:'';position:absolute;bottom:-50px;right:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);}
.hero-eyebrow{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:.5rem;}
.hero-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:.3rem;position:relative;z-index:1;}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.5;position:relative;z-index:1;}
.hero-ckp{margin-top:1rem;padding:.875rem 1rem;background:rgba(255,255,255,0.12);border-radius:10px;position:relative;z-index:1;}
.ckp-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:.35rem;}
.ckp-val{font-size:13px;font-weight:500;color:#fff;line-height:1.45;}
.ckp-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.7);margin-right:7px;vertical-align:middle;}

/* ── TRACKER ── */
.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tracker-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:14px;}
.tc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.tc-icon{width:32px;height:32px;border-radius:10px;background:var(--purple-bg);display:flex;align-items:center;justify-content:center;}
.tc-icon svg{width:16px;height:16px;stroke:var(--purple);fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
.tc-pct{font-size:12px;font-weight:600;color:var(--purple);}
.tc-label{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:8px;}
.tc-bar-bg{height:4px;background:var(--bg3);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.tc-bar-fill{height:100%;background:var(--purple);border-radius:10px;transition:width .4s;}
.tc-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.tc-fact{font-size:22px;font-weight:500;color:var(--ink);}
.tc-plan{font-size:11px;color:var(--ink3);}
.tc-inputs{display:flex;gap:6px;}
.tc-input{width:100%;height:32px;border-radius:8px;border:0.5px solid var(--edge2);background:var(--bg3);color:var(--ink);font-size:12px;padding:0 8px;font-family:inherit;text-align:center;}

/* ── DEPT GRID (ЦКП) ── */
.dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dept-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:1rem;}
.dept-card.full{grid-column:1/-1;border-color:var(--purple);background:var(--purple-bg);}
.dept-card.full .dc-name{color:var(--purple-text);}
.dept-card.full .dc-ckp{color:var(--purple-text);opacity:.8;}
.dc-icon{width:32px;height:32px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:.625rem;}
.dc-icon svg{width:16px;height:16px;stroke:var(--ink2);fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
.dept-card.full .dc-icon{background:rgba(83,74,183,0.15);}
.dept-card.full .dc-icon svg{stroke:var(--purple);}
.dc-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:.2rem;}
.dc-ckp{font-size:11px;color:var(--ink2);line-height:1.4;}

/* ── PIPELINE ── */
.pipeline{display:flex;flex-direction:column;}
.stage-row{display:grid;grid-template-columns:32px 1fr;gap:0 12px;}
.stage-spine{display:flex;flex-direction:column;align-items:center;}
.s-node{width:28px;height:28px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.s-line{flex:1;width:1px;background:var(--edge2);min-height:10px;}
.s-line.last{background:transparent;}
.stage-content{padding-bottom:10px;}
.stage-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s;}
.stage-card.open{border-color:var(--purple);}
.sh{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.sh-body{flex:1;min-width:0;}
.sh-dept{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;}
.sh-name{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-product{font-size:11px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.check-badge{min-width:20px;height:20px;border-radius:20px;padding:0 5px;background:var(--teal-bg);color:var(--teal);display:none;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.check-badge.show{display:flex;}
.sh-chev{color:var(--ink3);transition:transform .2s;flex-shrink:0;}
.sh-chev svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.stage-card.open .sh-chev{transform:rotate(180deg);}
.sb{display:none;border-top:0.5px solid var(--edge);}
.stage-card.open .sb{display:block;}
.sb-tabs{display:flex;border-bottom:0.5px solid var(--edge);}
.sb-tab{flex:1;padding:9px 4px;font-size:11px;font-weight:500;color:var(--ink3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;}
.sb-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.sb-panel{display:none;padding:12px 14px;}
.sb-panel.active{display:block;}
.sb-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--edge);}
.task-item:last-child{border-bottom:none;}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--edge2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.task-check svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.task-check.done{background:var(--purple);border-color:var(--purple);}
.task-check.done svg{opacity:1;}
.task-text{font-size:12px;color:var(--ink2);line-height:1.4;}
.task-text.done{text-decoration:line-through;color:var(--ink3);}
.product-chip{display:inline-flex;align-items:center;gap:6px;background:var(--purple-bg);color:var(--purple-text);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;margin-top:4px;}
.product-chip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
.metric-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.metric-pill{font-size:11px;color:var(--ink2);background:var(--bg3);border:0.5px solid var(--edge);border-radius:20px;padding:3px 10px;}
.note-area{width:100%;min-height:80px;border-radius:10px;border:0.5px solid var(--edge2);background:var(--bg3);color:var(--ink);font-size:12px;padding:10px 12px;font-family:inherit;resize:none;line-height:1.5;}
.note-area::placeholder{color:var(--ink3);}
.share-btn{display:flex;align-items:center;gap:8px;margin-top:10px;width:100%;height:38px;border-radius:10px;border:0.5px solid rgba(37,211,102,.4);background:rgba(37,211,102,.08);color:#25D366;font-size:12px;font-weight:500;cursor:pointer;justify-content:center;font-family:inherit;}
.share-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}

/* ── CHAIN ── */
.chain-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.ch-step{background:var(--bg2);border:0.5px solid var(--edge);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:500;color:var(--ink2);}
.ch-step.first{background:var(--purple-bg);color:var(--purple-text);border-color:rgba(83,74,183,.2);}
.ch-step.last{background:var(--teal-bg);color:var(--teal-text);border-color:rgba(15,110,86,.2);}
.ch-arr{font-size:11px;color:var(--ink3);}

/* ── PANELS ── */
.panel{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:1rem;margin-bottom:10px;}
.panel-head{display:flex;align-items:center;gap:10px;margin-bottom:.875rem;}
.panel-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.panel-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
.pi-amber{background:var(--amber-bg);color:var(--amber);}
.pi-teal{background:var(--teal-bg);color:var(--teal);}
.pi-coral{background:var(--coral-bg);color:var(--coral);}
.panel-title{font-size:13px;font-weight:600;color:var(--ink);}
.bn-item{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--edge);}
.bn-item:last-child{border-bottom:none;}
.bn-bar{width:2px;border-radius:2px;background:var(--amber);flex-shrink:0;align-self:stretch;min-height:24px;}
.bn-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.bn-text{font-size:11px;color:var(--ink2);line-height:1.4;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kpi-cell{background:var(--bg3);border-radius:10px;padding:10px 12px;}
.kpi-val{font-size:15px;font-weight:500;color:var(--ink);}
.kpi-lbl{font-size:11px;color:var(--ink3);margin-top:2px;}
.imp-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--edge);}
.imp-item:last-child{border-bottom:none;}
.imp-dept{font-size:11px;font-weight:600;background:var(--bg3);border-radius:20px;padding:3px 9px;color:var(--ink2);white-space:nowrap;flex-shrink:0;}
.imp-text{font-size:11px;color:var(--ink2);line-height:1.4;padding-top:2px;}

/* ── TEAM ── */
.team-strip{display:flex;flex-wrap:wrap;gap:8px;}
.team-card{background:var(--bg2);border:0.5px solid var(--edge);border-radius:var(--r);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;}
.team-avatar{width:32px;height:32px;border-radius:10px;background:var(--purple-bg);color:var(--purple-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.team-name{font-size:12px;font-weight:600;color:var(--ink);}
.team-ckp{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.35;}

.in-out{display:flex;margin-bottom:1rem;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--edge2);}
@media(max-width:480px){.in-out{flex-direction:column;}.io-div{width:100%;height:1px;}}
.io-side{flex:1;padding:14px 16px;background:var(--bg2);}
.io-div{width:1px;background:var(--edge2);flex-shrink:0;}
.io-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.io-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.io-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;}
.io-sub{font-size:11px;color:var(--ink2);margin-top:4px;line-height:1.4;}

.top-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);border:0.5px solid var(--edge2);border-radius:20px;padding:3px 10px;}
.tag.accent{background:var(--purple-bg);color:var(--purple-text);border-color:rgba(83,74,183,.2);}
.page-header{margin-bottom:1rem;}
.page-header h2{font-size:17px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.page-header p{font-size:12px;color:var(--ink3);}
.full-col{grid-column:1/-1;}

/* ── TOAST ── */

<script>
const STORE = 'embassy-pl-v1';
let currentDept = 'company';
let presentStages = [];
let presentIdx = 0;
let isDark = false;

// ── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme(){
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);

}

  }catch(e){}
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(8px)'; }, 1800);
}

// ── STORAGE ──────────────────────────────────────────────────────────────────
function saveAll(){
  const data={};
  document.querySelectorAll('[contenteditable][data-sid]').forEach(el=>{ data[el.dataset.sid]=el.innerHTML; });
  // tracker values
  document.querySelectorAll('.tc-input[data-key]').forEach(el=>{ data['tracker-'+el.dataset.key]=el.value; });
  // checklist
  document.querySelectorAll('.task-check[data-ckey]').forEach(el=>{ data['check-'+el.dataset.ckey]=el.classList.contains('done')?'1':'0'; });
  // notes
  document.querySelectorAll('.note-area[data-nkey]').forEach(el=>{ data['note-'+el.dataset.nkey]=el.value; });
  try{ localStorage.setItem(STORE, JSON.stringify(data)); }catch(e){}
}
function loadAll(){
  let data; try{ data=JSON.parse(localStorage.getItem(STORE)||'null'); }catch(e){ return; }
  if(!data) return;
  document.querySelectorAll('[contenteditable][data-sid]').forEach(el=>{ if(data[el.dataset.sid]!==undefined) el.innerHTML=data[el.dataset.sid]; });
  document.querySelectorAll('.tc-input[data-key]').forEach(el=>{ if(data['tracker-'+el.dataset.key]!==undefined){ el.value=data['tracker-'+el.dataset.key]; updateTracker(el); } });
  document.querySelectorAll('.task-check[data-ckey]').forEach(el=>{ if(data['check-'+el.dataset.ckey]==='1') setCheckDone(el,true); });
  document.querySelectorAll('.note-area[data-nkey]').forEach(el=>{ if(data['note-'+el.dataset.nkey]!==undefined) el.value=data['note-'+el.dataset.nkey]; });
}
function resetData(){ if(confirm('Сбросить все данные?')){ localStorage.removeItem(STORE); location.reload(); } }
let saveTimer;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ saveAll(); showToast('✓ Сохранено'); },800); }

// ── CHECKLIST ────────────────────────────────────────────────────────────────
function setCheckDone(el, done){
  if(done){ el.classList.add('done'); el.textContent='✓'; }
  else{ el.classList.remove('done'); el.textContent=''; }
  const text = el.nextElementSibling;
  if(text) text.classList.toggle('done', done);
  // update badge
  const card = el.closest('.stage-card');
  if(card) updateBadge(card);
}
function toggleCheck(el){
  setCheckDone(el, !el.classList.contains('done'));
  scheduleSave();
}
function updateBadge(card){
  const checks = card.querySelectorAll('.task-check');
  const done = card.querySelectorAll('.task-check.done');
  const badge = card.querySelector('.check-badge');
  if(!badge) return;
  if(done.length > 0 && done.length === checks.length){
    badge.textContent='✓'; badge.classList.add('show');
  } else if(done.length > 0){
    badge.textContent=done.length+'/'+checks.length; badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ── TRACKER ──────────────────────────────────────────────────────────────────
function updateTracker(input){
  const card = input.closest('.tracker-card');
  if(!card) return;
  const inputs = card.querySelectorAll('.tc-input');
  const fact = parseInt(inputs[0]?.value)||0;
  const plan = parseInt(inputs[1]?.value)||1;
  const pct = Math.min(100, Math.round(fact/plan*100));
  const fill = card.querySelector('.tc-bar-fill');
  const pctEl = card.querySelector('.tc-pct');
  const factEl = card.querySelector('.tc-fact');
  const planEl = card.querySelector('.tc-plan');
  if(fill) fill.style.width = pct+'%';
  if(pctEl) pctEl.textContent = pct+'%';
  if(factEl) factEl.textContent = fact;
  if(planEl) planEl.textContent = 'из '+plan;
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function highlight(text, q){
  if(!q) return esc(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function doSearch(q){
  const res = document.getElementById('search-results');
  if(!q || q.length < 1){ res.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const results=[];

  DEPTS.forEach(d=>{
    // Search dept-level fields too
    const deptMatch = [d.title||'', d.sub||'', d.label||'', d.outputTitle||'', d.outputSub||'', d.inputTitle||'']
      .join(' ').toLowerCase().includes(ql);

    // Search team CKPs
    (d.team||[]).forEach(m=>{
      const teamSearchable = [m.name, m.ckp].join(' ').toLowerCase();
      if(teamSearchable.includes(ql)){
        results.push({
          dept: d.label,
          deptId: d.id,
          stageN: null,
          name: m.name,
          snippet: m.ckp,
          type: 'team'
        });
      }
    });

    // Search stages
    (d.stages||[]).forEach(s=>{
      const searchable = [
        s.name, s.product, s.role||'', s.deadline||'',
        ...(s.tasks||[]),
        ...(s.metrics||[])
      ].join(' ').toLowerCase();

      if(searchable.includes(ql)){
        const snippet =
          (s.tasks||[]).find(t=>t.toLowerCase().includes(ql)) ||
          (s.metrics||[]).find(m=>m.toLowerCase().includes(ql)) ||
          s.product;
        results.push({
          dept: d.label,
          deptId: d.id,
          stageN: s.n,
          name: s.name,
          snippet: snippet,
          type: 'stage'
        });
      }
    });

    // Search bottlenecks
    (d.bns||[]).forEach(b=>{
      if([b.t, b.tx].join(' ').toLowerCase().includes(ql)){
        results.push({
          dept: d.label,
          deptId: d.id,
          stageN: null,
          name: '⚡ ' + b.t,
          snippet: b.tx,
          type: 'bn'
        });
      }
    });
  });

  if(!results.length){
    res.innerHTML='<div style="color:var(--ink3);font-size:13px;padding:1rem 0">Ничего не найдено по запросу «'+esc(q)+'»</div>';
    return;
  }

  // Group by dept
  const grouped = {};
  results.forEach(r=>{
    if(!grouped[r.deptId]) grouped[r.deptId] = {label: r.dept, items: []};
    grouped[r.deptId].items.push(r);
  });

  let out = `<div style="font-size:12px;color:var(--ink3);margin-bottom:.75rem">Найдено: ${results.length} результатов</div>`;
  Object.values(grouped).forEach(g=>{
    out += `<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:1rem 0 .5rem">${esc(g.label)}</div>`;
    out += g.items.map(r=>`
      <div class="search-result" onclick="${r.stageN ? `goToStage('${r.deptId}',${r.stageN})` : `switchPage('${r.deptId}');closeSearch()`}">
        <div class="sr-dept">${r.type==='team'?'Сотрудник':r.type==='bn'?'Узкое место':'Этап '+( r.stageN||'')}</div>
        <div class="sr-name">${highlight(r.name,q)}</div>
        <div class="sr-snippet">${highlight(r.snippet||'',q)}</div>
      </div>`).join('');
  });

  res.innerHTML = out;
}
function goToStage(deptId, stageN){
  closeSearch();
  switchPage(deptId);
  setTimeout(()=>{
    const card = document.querySelector(`#pipe-${deptId} .stage-card[data-n="${stageN}"]`);
    if(card){ card.classList.add('open'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
  }, 200);
}

// ── PRESENTATION ─────────────────────────────────────────────────────────────
function openPresent(){
  const dept = DEPTS.find(d=>d.id===currentDept);
  if(!dept||!dept.stages) return;
  presentStages = dept.stages;
  presentIdx = 0;
  document.getElementById('present-dept-title').textContent = dept.label + ' · Презентация';

}
function closePresent(){ document.getElementById('present-overlay').classList.remove('open'); }
function presentNav(dir){
  presentIdx = Math.max(0, Math.min(presentStages.length-1, presentIdx+dir));
  renderPresentSlide();
}
function renderPresentSlide(){
  const s = presentStages[presentIdx];
  const total = presentStages.length;
  document.getElementById('present-prog').textContent = (presentIdx+1)+' / '+total;
  document.getElementById('prev-btn').disabled = presentIdx===0;
  document.getElementById('next-btn').disabled = presentIdx===total-1;
  document.getElementById('present-body').innerHTML=`
    <div class="present-stage">
      <div class="ps-num">${s.n}</div>
      <div class="ps-dept">${s.role||''}</div>
      <div class="ps-name">${s.name}</div>
      <div class="ps-product">${s.product}</div>
      <ul class="ps-tasks">${(s.tasks||[]).map(t=>`<li>${t}</li>`).join('')}</ul>
      <div style="margin-top:1rem;">
        <div class="ps-dept" style="margin-bottom:.5rem">МЕТРИКИ КАЧЕСТВА</div>
        <div class="metric-pills">${(s.metrics||[]).map(m=>`<span class="metric-pill">${m}</span>`).join('')}</div>
      </div>
    </div>`;
}

function buildPipeline(stages, containerId, deptLabel){
  const container = document.getElementById(containerId);
  stages.forEach((s,i)=>{
    const row=document.createElement('div'); row.className='stage-row';
    const spine=document.createElement('div'); spine.className='stage-spine';
    const node=document.createElement('div'); node.className='s-node'; node.textContent=s.n;
    const line=document.createElement('div'); line.className='s-line'+(i===stages.length-1?' last':'');
    spine.append(node,line);
    const wrap=document.createElement('div'); wrap.className='stage-content';
    const card=document.createElement('div'); card.className='stage-card'; card.dataset.n=s.n;
    const ckey=deptLabel+'_'+s.n;
    card.innerHTML=`
      <button class="stage-del-btn" onclick="delItem(this.closest('.stage-row'))" title="Удалить этап"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="sh">
        <div class="sh-body">
          <div class="sh-dept">${s.role||''}</div>
          <div class="sh-name" contenteditable="true" data-sid="sn-${ckey}" onclick="event.stopPropagation()">${s.name}</div>
          <div class="sh-product">→ <span contenteditable="true" data-sid="sp-${ckey}" onclick="event.stopPropagation()">${s.product}</span></div>
        </div>
        <div class="sh-right">
          <div class="check-badge"></div>
          <span class="sh-chev"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
        </div>
      </div>
      <div class="sb">
        <div class="sb-tabs">
          <div class="sb-tab active" onclick="switchTab(this,'tasks')">Задачи</div>
          <div class="sb-tab" onclick="switchTab(this,'info')">Детали</div>
          <div class="sb-tab" onclick="switchTab(this,'notes')">Заметки</div>
        </div>
        <div class="sb-panel active" data-panel="tasks">
          <div class="sb-lbl" style="margin-top:4px">ЧЕКЛИСТ</div>
          ${s.tasks.map((t,ti)=>`
            <div class="task-item">
              <div class="task-check" data-ckey="${ckey}_${ti}" onclick="toggleCheck(this)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
              <div class="task-text" contenteditable="true" data-sid="st-${ckey}-${ti}" onclick="event.stopPropagation()">${t}</div>
          <button class="del-btn" onclick="delItem(this.closest('.task-item'))" title="Удалить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>`).join('')}
        <button class="add-btn" onclick="addTask(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Добавить задачу</button>
        </div>
        <div class="sb-panel" data-panel="info">
          <div style="margin-bottom:10px">
            <div class="sb-lbl">ОТВЕТСТВЕННЫЙ</div>
            <div style="font-size:12px;font-weight:500;color:var(--ink)" contenteditable="true" data-sid="sr-${ckey}">${s.role}</div>
          </div>
          <div style="margin-bottom:10px">
            <div class="sb-lbl">СРОК</div>
            <div style="font-size:12px;font-weight:500;color:var(--ink)" contenteditable="true" data-sid="sd-${ckey}">${s.deadline}</div>
          </div>
          <div style="margin-bottom:10px">
            <div class="sb-lbl">ПРОДУКТ (ЦКП ЭТАПА)</div>
            <div class="product-chip" contenteditable="true" data-sid="spr-${ckey}">${s.product}</div>
          </div>
          <div>
            <div class="sb-lbl">МЕТРИКИ КАЧЕСТВА</div>
            <div class="metric-pills">${s.metrics.map((m,mi)=>`<span class="metric-wrap"><span class="metric-pill" contenteditable="true" data-sid="sm-${ckey}-${mi}">${m}</span><button class="del-btn" onclick="delItem(this.closest('.metric-wrap'))" title="Удалить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`).join('')}</div>
          <button class="add-btn" onclick="addMetric(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Добавить метрику</button>
          </div>
        </div>
        <div class="sb-panel" data-panel="notes">
          <div class="sb-lbl" style="margin-top:4px">ЗАМЕТКИ К ЭТАПУ</div>
          <textarea class="note-area" data-nkey="${ckey}" placeholder="Добавьте заметку или комментарий к этому этапу..." oninput="scheduleSave()"></textarea>
          <button class="share-btn" onclick="shareStage(${JSON.stringify(s).replace(/</g,'\\u003c')}, '${deptLabel}')">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg> Поделиться через WhatsApp
          </button>
        </div>
      </div>`;
    card.querySelector('.sh').addEventListener('click',()=>{
      const was=card.classList.contains('open');
      container.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('open'));
      if(!was) card.classList.add('open');
    });
    wrap.appendChild(card); row.append(spine,wrap); container.appendChild(row);
  });
}

function switchTab(tab, panel){
  const sb = tab.closest('.sb');
  sb.querySelectorAll('.sb-tab').forEach(t=>t.classList.remove('active'));
  sb.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  sb.querySelector(`[data-panel="${panel}"]`).classList.add('active');
}

function switchPage(id){
  currentDept = id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+id));
  const dept = DEPTS.find(d=>d.id===id);
  if(id==='analytics'){
    document.getElementById('top-title').textContent = 'Аналитика';
    fetchSheetData();
  } else {
    document.getElementById('top-title').textContent = dept ? dept.title.split('·')[0].trim() : 'Embassy';
  }
  window.scrollTo(0,0);
}

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  const rows = [];
  // Skip header rows (first 3 rows: title, group headers, column headers)
  let dataStart = 0;
  for(let i=0;i<lines.length;i++){
    const first = lines[i].split(',')[0].replace(/"/g,'').trim();
    // Data rows start where first cell looks like a date DD.MM.YYYY
    if(/^\d{2}\.\d{2}\.\d{4}$/.test(first) || /^\d{4}-\d{2}-\d{2}/.test(first)){
      dataStart = i; break;
    }
  }
  for(let i=dataStart; i<lines.length; i++){
    const cells = parseCSVLine(lines[i]);
    if(!cells[0]) continue;
    const dateStr = cells[0].replace(/"/g,'').trim();
    // Parse date: DD.MM.YYYY or YYYY-MM-DD
    let d = null;
    if(/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)){
      const [dd,mm,yyyy] = dateStr.split('.');
      d = new Date(+yyyy, +mm-1, +dd);
    } else if(/^\d{4}-\d{2}-\d{2}/.test(dateStr)){
      d = new Date(dateStr.split('T')[0]);
    }
    if(!d || isNaN(d.getTime())) continue;
    const num = s => parseFloat((s||'').replace(/"/g,'').replace(/\s/g,'').replace(',','.')) || 0;
    rows.push({
      date: d,
      rev_off:     num(cells[COL.rev_off]),
      rev_onl:     num(cells[COL.rev_onl]),
      leads_off:   num(cells[COL.leads_off]),
      leads_onl:   num(cells[COL.leads_onl]),
      spend:       num(cells[COL.spend]),
      sales_off:   num(cells[COL.sales_off]),
      sales_onl:   num(cells[COL.sales_onl]),
      avg_off:     num(cells[COL.avg_off]),
      avg_onl:     num(cells[COL.avg_onl]),
      pu_rec_off:  num(cells[COL.pu_rec_off]),
      pu_rec_onl:  num(cells[COL.pu_rec_onl]),
      pu_came_off: num(cells[COL.pu_came_off]),
      pu_came_onl: num(cells[COL.pu_came_onl]),
      gr_off:      num(cells[COL.gr_off]),
      gr_onl:      num(cells[COL.gr_onl]),
      st_off:      num(cells[COL.st_off]),
      st_onl:      num(cells[COL.st_onl]),
      rooms_used:  num(cells[COL.rooms_used]),
      occ_pct:     num(cells[COL.occ_pct]),
    });
  }
  return rows;
}

function parseCSVLine(line){
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){ inQ=!inQ; }
    else if(line[i]===','&&!inQ){ result.push(cur); cur=''; }
    else cur+=line[i];
  }
  result.push(cur);
  return result;
}

// ── FETCH DATA ───────────────────────────────────────────────────────────────
async function fetchSheetData(forceRefresh=false){
  if(sheetLoading) return;
  if(sheetLoaded && !forceRefresh) return;

  sheetLoading = true;
  sheetError = null;
  renderAnalyticsLoading(true);

  try{
    // Add cache buster
    const url = SHEET_URL + '&cachebust=' + Date.now();
    const resp = await fetch(url, {cache:'no-store'});
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    sheetRows = parseCSV(text);
    sheetLoaded = true;
    console.log('Loaded', sheetRows.length, 'rows from sheet');
    if(!plansLoaded) fetchPlansData();
  } catch(e){
    sheetError = e.message;
    console.error('Sheet fetch error:', e);
  }

  sheetLoading = false;
  renderAnalyticsLoading(false);
  renderAnalytics();
}

async function fetchPlansData(){
  if(!PLANS_URL){ loadPlansFromStorage(); return; }
  try{
    const resp = await fetch(PLANS_URL + '&cachebust=' + Date.now(), {cache:'no-store'});
    if(!resp.ok) throw new Error('plans HTTP '+resp.status);
    const text = await resp.text();
    parsePlansCSV(text);
    savePlansToStorage();
  } catch(e){
    console.warn('Plans fetch failed, using stored:', e.message);
    loadPlansFromStorage();
  }
}

function parsePlansCSV(text){
  const lines = text.trim().split('\n');
  plansData = {};
  for(let i=2; i<lines.length; i++){
    const cells = lines[i].split(',').map(c=>c.replace(/"/g,'').trim());
    const key = cells[1];
    const monthly = parseFloat(cells[2])||0;
    const daily = parseFloat(cells[3])||0;
    if(key && monthly) plansData[key] = {monthly, daily};
  }
  plansLoaded = true;
  console.log('Plans loaded:', Object.keys(plansData).length, 'items');
}

function savePlansToStorage(){
  try{ localStorage.setItem('embassy-plans-v1', JSON.stringify(plansData)); }catch(e){}
}
function loadPlansFromStorage(){
  try{
    const raw = localStorage.getItem('embassy-plans-v1');
    if(raw){ plansData = JSON.parse(raw); plansLoaded = true; }
  }catch(e){}
}

function getPlan(key, days){
  if(!plansData[key]) return null;
  const {monthly, daily} = plansData[key];
  // For period: scale monthly plan by days/30
  return Math.round(monthly * days / 30);
}

function getPct(fact, plan){
  if(!plan || plan===0) return null;
  return Math.round(fact / plan * 100);
}

// ── DATE RANGE ───────────────────────────────────────────────────────────────
function getDateRange(){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if(rangeMode==='today'){
    return {from: today, to: today, label: 'Сегодня'};
  }
  if(rangeMode==='yesterday'){
    const y = new Date(today); y.setDate(y.getDate()-1);
    return {from: y, to: y, label: 'Вчера'};
  }
  if(rangeMode==='week'){
    const f = new Date(today); f.setDate(f.getDate()-6);
    return {from: f, to: today, label: 'Последние 7 дней'};
  }
  if(rangeMode==='month'){
    const f = new Date(today.getFullYear(), today.getMonth(), 1);
    return {from: f, to: today, label: 'Текущий месяц'};
  }
  if(rangeMode==='prev_month'){
    const f = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const t = new Date(today.getFullYear(), today.getMonth(), 0);
    const mn = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    return {from: f, to: t, label: mn[f.getMonth()] + ' ' + f.getFullYear()};
  }
  if(rangeMode==='custom' && customFrom && customTo){
    const fmt = d => d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
    return {from: customFrom, to: customTo, label: fmt(customFrom)+' – '+fmt(customTo)};
  }
  const f = new Date(today.getFullYear(), today.getMonth(), 1);
  return {from: f, to: today, label: 'Текущий месяц'};
}

function filterRows(from, to){
  return sheetRows.filter(r => r.date >= from && r.date <= to);
}

function sumField(rows, field){ return rows.reduce((a,r)=>a+(r[field]||0),0); }
function lastField(rows, field){ return rows.length ? rows[rows.length-1][field] : 0; }
function avgField(rows, field){
  const nonzero = rows.filter(r=>(r[field]||0)>0);
  return nonzero.length ? nonzero.reduce((a,r)=>a+r[field],0)/nonzero.length : 0;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function fmt(n){ return Math.round(n).toLocaleString('ru-RU'); }
function fmtPct(n){ return (Math.round(n*10)/10).toFixed(1)+'%'; }

function setAEl(id, val){
  const el = document.getElementById(id);
  if(el) el.textContent = val;
}

function renderAnalyticsLoading(loading){
  const el = document.getElementById('an-status');

  } else {
    el.innerHTML=`<span style="color:var(--teal);font-size:12px">✓ Данные обновлены · ${sheetRows.length} дней · <button onclick="fetchSheetData(true)" style="color:var(--purple);background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px">Обновить</button></span>`;

function renderAnalytics(){
  if(!sheetLoaded && !sheetError) return;
  const range = getDateRange();
  const rows = filterRows(range.from, range.to);
  const days = Math.max(1, Math.round((range.to - range.from)/(1000*60*60*24))+1);

  setAEl('an-period-label', range.label);
  setAEl('an-rows-count', rows.length + ' дн. · ' + days + ' дн. в периоде');

  if(!rows.length){
    setAEl('an-no-data','Нет данных за выбранный период');
    document.getElementById('an-data-wrap')?.style.setProperty('display','none');
    return;
  }
  setAEl('an-no-data','');
  document.getElementById('an-data-wrap')?.style.setProperty('display','block');

  // helper: render plan/fact/% into element
  function pf(elId, fact, planKey, color, fmtFn){
    const el = document.getElementById(elId);
    if(!el) return;
    const plan = getPlan(planKey, days);
    const pct = plan ? getPct(fact, plan) : null;
    const factStr = fmtFn ? fmtFn(fact) : fact;
    const planStr = plan ? (fmtFn ? fmtFn(plan) : plan) : null;
    const isOver = pct !== null && pct > 100;
    const isWarn = pct !== null && pct < 60;
    let html2 = `<div class="an-scv">${factStr}</div>`;
    if(planStr){
      const barW = Math.min(100, pct||0);
      const cls = `pf-wrap pf-${color}${isWarn?' pf-warn':''}`;
      html2 += `<div class="${cls}">
        <div class="pf-row">
          <div class="pf-bar-bg"><div class="pf-bar-fill" style="width:${barW}%"></div></div>
          <span class="pf-pct">${pct!==null?pct+'%':'—'}</span>
        </div>
        <div class="pf-sub">план: ${planStr}</div>
      </div>`;
    }
    el.innerHTML = html2;
  }

  // ПРИХОД
  const revOff = sumField(rows,'rev_off');
  const revOnl = sumField(rows,'rev_onl');
  const revTotal = revOff + revOnl;
  setAEl('an-rev-total', fmt(revTotal)+' ₸');
  setAEl('an-rev-off', fmt(revOff)+' ₸');
  setAEl('an-rev-onl', fmt(revOnl)+' ₸');
  const offPct = revTotal>0?Math.round(revOff/revTotal*100):0;
  const onlPct = revTotal>0?Math.round(revOnl/revTotal*100):0;
  setAEl('an-rev-off-pct', offPct+'%');
  setAEl('an-rev-onl-pct', onlPct+'%');
  const bOff=document.getElementById('an-bar-rev-off'); if(bOff) bOff.style.width=offPct+'%';
  const bOnl=document.getElementById('an-bar-rev-onl'); if(bOnl) bOnl.style.width=onlPct+'%';
  // plan/fact for revenue in hero
  const revPlan = getPlan('rev_total', days);
  const revPct = revPlan ? getPct(revTotal, revPlan) : null;
  const revPlanEl = document.getElementById('an-rev-plan');
  if(revPlanEl && revPlan){
    const barW = Math.min(100, revPct||0);
    revPlanEl.innerHTML=`<div style="height:3px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden;margin-top:8px"><div style="height:100%;background:#fff;border-radius:10px;width:${barW}%;transition:width .5s"></div></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:rgba(255,255,255,.55)">план: ${fmt(revPlan)} ₸</span><span style="font-size:11px;font-weight:600;color:${revPct>=100?'#9FE1CB':'rgba(255,255,255,.9)'}">${revPct}%</span></div>`;
  }

  // МАРКЕТИНГ
  const leadsOff=sumField(rows,'leads_off'), leadsOnl=sumField(rows,'leads_onl');
  const leadsTotal=leadsOff+leadsOnl;
  const spend=sumField(rows,'spend');
  const cpl=leadsTotal>0?spend/leadsTotal:0;
  pf('an-leads-block', leadsTotal, 'leads_total', 'teal', v=>v);
  pf('an-cpl-block', Math.round(cpl), 'cpl', 'teal', v=>fmt(v)+' ₸');
  pf('an-spend-block', spend, 'spend', 'teal', v=>fmt(v)+' ₸');
  const loEl=document.getElementById('an-leads-split');
  if(loEl){
    const loPlan=getPlan('leads_off',days), lonPlan=getPlan('leads_onl',days);
    const loPct=loPlan?getPct(leadsOff,loPlan):null, lonPct=lonPlan?getPct(leadsOnl,lonPlan):null;
    loEl.innerHTML=`<div class="an-scl">ОФФ / ОНЛ</div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:4px">
        <span class="an-scv">${leadsOff}</span><span style="font-size:11px;color:#085041;opacity:.4">/</span><span class="an-scv">${leadsOnl}</span>
      </div>
      <div class="pf-wrap pf-teal"><div class="pf-sub">${loPct!==null?loPct+'%':'—'} / ${lonPct!==null?lonPct+'%':'—'}</div></div>`;
  }

  // ПРОДАЖИ
  const salesOff=sumField(rows,'sales_off'), salesOnl=sumField(rows,'sales_onl');
  const salesTotal=salesOff+salesOnl;
  const avgOff=avgField(rows,'avg_off'), avgOnl=avgField(rows,'avg_onl');
  pf('an-sales-block', salesTotal, 'sales_total', 'amb', v=>v);
  pf('an-avg-off-block', Math.round(avgOff), 'avg_off', 'amb', v=>fmt(v)+' ₸');
  pf('an-avg-onl-block', Math.round(avgOnl), 'avg_onl', 'amb', v=>fmt(v)+' ₸');
  const soEl=document.getElementById('an-sales-split');
  if(soEl){
    const soPlan=getPlan('sales_off',days), sonPlan=getPlan('sales_onl',days);
    const soPct=soPlan?getPct(salesOff,soPlan):null, sonPct=sonPlan?getPct(salesOnl,sonPlan):null;
    soEl.innerHTML=`<div class="an-scl">ОФФ / ОНЛ</div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:4px">
        <span class="an-scv">${salesOff}</span><span style="font-size:11px;color:#633806;opacity:.4">/</span><span class="an-scv">${salesOnl}</span>
      </div>
      <div class="pf-wrap pf-amb"><div class="pf-sub">${soPct!==null?soPct+'%':'—'} / ${sonPct!==null?sonPct+'%':'—'}</div></div>`;
  }

  // ПУ
  const puRecOff=sumField(rows,'pu_rec_off'), puRecOnl=sumField(rows,'pu_rec_onl');
  const puRecTotal=puRecOff+puRecOnl;
  const puCameOff=sumField(rows,'pu_came_off'), puCameOnl=sumField(rows,'pu_came_onl');
  const puCameTotal=puCameOff+puCameOnl;
  const puConv=puRecTotal>0?puCameTotal/puRecTotal*100:0;
  const puConvOff=puRecOff>0?puCameOff/puRecOff*100:0;
  const puConvOnl=puRecOnl>0?puCameOnl/puRecOnl*100:0;
  pf('an-pu-rec-block', puRecTotal, 'pu_rec_total', 'pur', v=>v);
  pf('an-pu-came-block', puCameTotal, 'pu_came_total', 'pur', v=>v);
  // Conv % — plan is fixed target not scaled by days
  const convPlan = plansData['pu_conv']?.monthly || null;
  const convPct2 = convPlan ? getPct(Math.round(puConv), convPlan) : null;
  const convEl = document.getElementById('an-pu-conv-block');
  if(convEl){
    const barW = Math.min(100, convPct2||0);
    const isWarn = convPct2!==null && convPct2<80;
    convEl.innerHTML=`<div class="an-scv" style="color:#534AB7">${(Math.round(puConv*10)/10).toFixed(1)}%</div>`
      + (convPlan ? `<div class="pf-wrap pf-pur${isWarn?' pf-warn':''}">
        <div class="pf-row"><div class="pf-bar-bg"><div class="pf-bar-fill" style="width:${barW}%"></div></div>
        <span class="pf-pct">${convPct2!==null?convPct2+'%':'—'}</span></div>
        <div class="pf-sub">цель: ${convPlan}%</div></div>` : '');
  }
  const bPU=document.getElementById('an-bar-pu'); if(bPU) bPU.style.width=Math.min(100,puConv)+'%';
  setAEl('an-pu-rec-off', puRecOff); setAEl('an-pu-came-off', puCameOff);
  setAEl('an-pu-conv-off', (Math.round(puConvOff*10)/10).toFixed(1)+'%');
  setAEl('an-pu-rec-onl', puRecOnl); setAEl('an-pu-came-onl', puCameOnl);
  setAEl('an-pu-conv-onl', (Math.round(puConvOnl*10)/10).toFixed(1)+'%');

  // АКАДЕМИЯ
  const grOff=lastField(rows,'gr_off'), grOnl=lastField(rows,'gr_onl');
  const stOff=lastField(rows,'st_off'), stOnl=lastField(rows,'st_onl');
  const rooms=lastField(rows,'rooms_used'), occ=lastField(rows,'occ_pct');
  pf('an-gr-block', grOff+grOnl, 'gr_off', 'cor', v=>v);
  pf('an-st-block', stOff+stOnl, 'st_off', 'cor', v=>v);
  setAEl('an-gr-off', grOff); setAEl('an-gr-onl', grOnl);
  setAEl('an-st-off', stOff); setAEl('an-st-onl', stOnl);
  setAEl('an-rooms', rooms);
  // Occ
  const occPlan = plansData['occ_pct']?.monthly || null;
  const occPct2 = occPlan ? getPct(Math.round(occ), occPlan) : null;
  const occEl = document.getElementById('an-occ');
  if(occEl){
    const barW = Math.min(100, occPct2||0);
    occEl.innerHTML=`<span style="font-size:20px;font-weight:500;color:#993C1D">${(Math.round(occ*10)/10).toFixed(0)}%</span>`
      + (occPlan ? `<div class="pf-wrap pf-cor"><div class="pf-row">
        <div class="pf-bar-bg"><div class="pf-bar-fill" style="width:${barW}%"></div></div>
        <span class="pf-pct">${occPct2!==null?occPct2+'%':'—'}</span></div>
        <div class="pf-sub">цель: ${occPlan}%</div></div>` : '');
  }
  const bOcc=document.getElementById('an-bar-occ'); if(bOcc) bOcc.style.width=Math.min(100,occ)+'%';
}
function setRangeMode(mode){
  rangeMode = mode;
  // Update active button
  document.querySelectorAll('.range-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===mode);
  });
  // Show/hide custom range
  const customWrap = document.getElementById('an-custom-wrap');
  if(customWrap) customWrap.style.display = mode==='custom' ? 'flex' : 'none';
  renderAnalytics();
}

  const f = document.getElementById('an-date-from');

  return page;
}


if('serviceWorker' in navigator){
  // Unregister all old SWs first, then register fresh
  navigator.serviceWorker.getRegistrations().then(regs => {
    const unregs = regs.map(r => r.unregister());
    Promise.all(unregs).then(() => {
      navigator.serviceWorker.register('./sw.js?v=1782311617').catch(()=>{});
    });
  });
  // Also clear all caches
  if(window.caches){
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
}
